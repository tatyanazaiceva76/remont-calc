name: Build and Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Node (для wrangler)
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: bun install

      - name: Build
        run: bun run build
        env:
          SITE_URL: https://www.kalkremont.ru

      - name: Metrika guard — билд падает при голом ym(99000000)
        run: bun scripts/check-dist-metrika.ts dist

      - name: Deploy to Cloudflare Pages (npx wrangler напрямую)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          npx -y wrangler@latest pages deploy dist \
            --project-name=remont-calc \
            --branch=main \
            --commit-dirty=true \
            --commit-message="auto ${{ github.sha }}"

      - name: IndexNow ping (notify Yandex + Bing)
        env:
          INDEXNOW_KEY: ${{ secrets.INDEXNOW_KEY }}
        run: bun scripts/indexnow.ts || echo "IndexNow ping skipped (not critical)"
