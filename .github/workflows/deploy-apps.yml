name: Deploy 30 Subdomain Apps

on:
  push:
    branches: [main]
    paths:
      - 'apps/**'
      - '.github/workflows/deploy-apps.yml'
  workflow_dispatch:
    inputs:
      apps:
        description: 'Через запятую (напр. moskva,vannye). Пусто = все 30.'
        required: false
        default: ''

jobs:
  matrix:
    runs-on: ubuntu-latest
    outputs:
      apps: ${{ steps.set.outputs.apps }}
    steps:
      - uses: actions/checkout@v4
      - id: set
        run: |
          if [ -n "${{ github.event.inputs.apps }}" ]; then
            APPS=$(echo "${{ github.event.inputs.apps }}" | tr ',' '\n' | jq -R . | jq -sc .)
          else
            # Все apps кроме astr/cbx/irk/izh/kem/khv/kir/kld/lpk/oren/pnz/rzn/sar/tlt/tul/vvo/yar/regiony/sovety/brand (не имеют CF Pages projects)
            APPS='["moskva","spb","ekb","kzn","nsk","krd","nn","chel","ufa","sam","rnd","vrn","perm","vlg","tyumen","brn","vannye","kuhni","okna","potolki","dveri","elektro","santehnika","dizayn","balkony","styazhka","uborka","demontazh","kondicioner","fasad","price","sovety","brand"]'
          fi
          echo "apps=$APPS" >> $GITHUB_OUTPUT

  deploy:
    needs: matrix
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      max-parallel: 6
      matrix:
        app: ${{ fromJson(needs.matrix.outputs.apps) }}
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      # Node нужен для wrangler — bun не запускает его корректно
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Skip if app dir missing
        id: check
        run: |
          if [ ! -d "apps/${{ matrix.app }}" ]; then
            echo "App apps/${{ matrix.app }} not found, skipping"
            echo "skip=true" >> $GITHUB_OUTPUT
          fi

      - name: Install deps + build
        if: steps.check.outputs.skip != 'true'
        working-directory: apps/${{ matrix.app }}
        run: |
          bun install
          bun run build

      - name: Metrika guard — деплой падает при голом ym(99000000)
        if: steps.check.outputs.skip != 'true'
        run: bun scripts/check-dist-metrika.ts "apps/${{ matrix.app }}/dist"

      - name: Deploy to CF Pages (direct npx, wrangler-action имеет баг)
        if: steps.check.outputs.skip != 'true'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          npx -y wrangler@latest pages deploy "apps/${{ matrix.app }}/dist" \
            --project-name="kalkremont-${{ matrix.app }}" \
            --branch=main \
            --commit-dirty=true \
            --commit-message="auto-deploy ${{ github.sha }}"
