name: Deploy 30 Subdomain Apps

on:
  push:
    branches: [main]
    paths:
      - 'apps/**'
      - '.github/workflows/deploy-apps.yml'
  workflow_dispatch:
    inputs:
      apps:
        description: 'Через запятую (напр. moskva,vannye). Пусто = все 30.'
        required: false
        default: ''

jobs:
  matrix:
    runs-on: ubuntu-latest
    outputs:
      apps: ${{ steps.set.outputs.apps }}
    steps:
      - uses: actions/checkout@v4
      - id: set
        run: |
          if [ -n "${{ github.event.inputs.apps }}" ]; then
            APPS=$(echo "${{ github.event.inputs.apps }}" | tr ',' '\n' | jq -R . | jq -sc .)
          else
            # Все apps кроме astr/cbx/irk/izh/kem/khv/kir/kld/lpk/oren/pnz/rzn/sar/tlt/tul/vvo/yar/regiony/sovety/brand (не имеют CF Pages projects)
            APPS='["moskva","spb","ekb","kzn","nsk","krd","nn","chel","ufa","sam","rnd","vrn","perm","vlg","tyumen","brn","vannye","kuhni","okna","potolki","dveri","elektro","santehnika","dizayn","balkony","styazhka","uborka","demontazh","kondicioner","fasad","price","sovety","brand"]'
          fi
          echo "apps=$APPS" >> $GITHUB_OUTPUT

  deploy:
    needs: matrix
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      max-parallel: 6
      matrix:
        app: ${{ fromJson(needs.matrix.outputs.apps) }}
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Skip if app dir missing
        id: check
        run: |
          if [ ! -d "apps/${{ matrix.app }}" ]; then
            echo "App apps/${{ matrix.app }} not found, skipping"
            echo "skip=true" >> $GITHUB_OUTPUT
          fi

      - name: Install deps + build
        if: steps.check.outputs.skip != 'true'
        working-directory: apps/${{ matrix.app }}
        run: |
          bun install
          bun run build

      - name: Deploy to CF Pages
        if: steps.check.outputs.skip != 'true'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy apps/${{ matrix.app }}/dist --project-name=kalkremont-${{ matrix.app }} --branch=main --commit-dirty=true --commit-message="auto-deploy from ${{ github.sha }}"
