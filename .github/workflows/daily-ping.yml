name: Daily IndexNow ping

on:
  schedule:
    # Каждый день в 09:00 UTC = 12:00 МСК
    - cron: '0 9 * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install
      - name: IndexNow daily ping (фрешность для Яндекс/Bing)
        env:
          INDEXNOW_KEY: ${{ secrets.INDEXNOW_KEY }}
        run: bun scripts/indexnow.ts
